# ===============================
# Database
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES}
jwt.refresh-token-expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS}

# ===============================
# OAuth Redirect
# ===============================
app.auth.redirect-uri=${OAUTH_REDIRECT_URI}

# ===============================
# Google OAuth
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS}

# ===============================
# File Storage
# ===============================
file.upload.dir=${FILE_UPLOAD_DIR}
file.upload.allowed-extensions=${FILE_UPLOAD_ALLOWED_EXTENSIONS}
file.upload.max-count=${FILE_UPLOAD_MAX_COUNT}
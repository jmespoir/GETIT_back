# ===============================
# Database
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:30}
jwt.refresh-token-expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:14}

# ===============================
# OAuth Redirect
# ===============================
app.auth.redirect-uri=${OAUTH_REDIRECT_URI:http://localhost:3000/oauth/callback}

# ===============================
# Google OAuth
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}

# ===============================
# File Storage
# ===============================
file.upload.dir=${FILE_UPLOAD_DIR:uploads}
file.upload.allowed-extensions=${FILE_UPLOAD_ALLOWED_EXTENSIONS:jpg,jpeg,png,pdf,zip}
file.upload.max-count=${FILE_UPLOAD_MAX_COUNT:5}